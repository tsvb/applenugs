name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Verify Sparkle update config
        run: ./scripts/verify-sparkle-config.sh

      - name: Build
        run: |
          xcodebuild \
            -project AppleNugs.xcodeproj \
            -scheme AppleNugs \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build iOS (Simulator)
        run: |
          xcodebuild \
            -project AppleNugs.xcodeproj \
            -scheme AppleNugs-iOS \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build-ios \
            CODE_SIGNING_ALLOWED=NO \
            build
