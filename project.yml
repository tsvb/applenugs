name: AppleNugs
options:
  bundleIdPrefix: com.timvbs
  deploymentTarget:
    macOS: "14.0"
    # iOS floor is set by pervasive @Observable/Observation usage — the same
    # constraint that sets the macOS 14 floor.
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    # Full data-race checking under the Swift 5 language mode: the codebase is
    # clean against it, and keeping it on surfaces any new concurrency issue as
    # a warning now (an error once we move to the Swift 6 language mode).
    SWIFT_STRICT_CONCURRENCY: "complete"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    # Marketing + build numbers live here; Info.plist references them so a
    # release is a one-line bump. Increment CURRENT_PROJECT_VERSION for every
    # build uploaded to App Store Connect.
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  AppleNugs:
    type: application
    platform: macOS
    sources:
      # AppleNugs/iOS is the iOS target's platform-specific code (entry point,
      # navigation shell, UIKit shims); everything else is shared.
      - path: AppleNugs
        excludes:
          - "iOS/**"
          # The iOS target's generated Info.plist materializes next to the Mac
          # one; keep it out of the Mac target's resource glob.
          - "Info-iOS.plist"
    scheme:
      testTargets:
        - AppleNugsUITests
      gatherCoverageData: false
    dependencies:
      - package: Sparkle
    entitlements:
      path: AppleNugs/AppleNugs.entitlements
      properties:
        # Minimal sandbox: outbound network only. No file/mic/camera access —
        # all persistence stays inside the app's own container.
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        # Sparkle's installer launcher XPC service communicates via mach lookup.
        # The -spks (spawner) and -spki (installer) suffixes are Sparkle's convention.
        # $(PRODUCT_BUNDLE_IDENTIFIER) is expanded by Xcode at signing time.
        com.apple.security.temporary-exception.mach-lookup.global-name:
          - "$(PRODUCT_BUNDLE_IDENTIFIER)-spks"
          - "$(PRODUCT_BUNDLE_IDENTIFIER)-spki"
    info:
      path: AppleNugs/Info.plist
      properties:
        CFBundleDisplayName: AppleNugs
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.music
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: "Personal use against your own nugs.net subscription only. Not affiliated with nugs.net."
        # Standard HTTPS/TLS only — exempt encryption. Declaring this skips the
        # export-compliance prompt on every App Store Connect upload.
        ITSAppUsesNonExemptEncryption: false
        # Sparkle runtime configuration.
        # SUEnableDownloaderService is omitted: network.client entitlement covers
        # outbound HTTPS and the downloader XPC is not needed in the sandbox.
        # SUEnableAutomaticChecks is omitted intentionally: leaving it unset
        # causes Sparkle to ask the user on first launch ("Check automatically?").
        SUFeedURL: https://raw.githubusercontent.com/tsvb/applenugs/main/appcast.xml
        SUPublicEDKey: WKOnGAu8QlsO9cDxBQ8peCSLDuVRTmx+p5MsruHqUFE=
        SUEnableInstallerLauncherService: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.timvbs.applenugs
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Hardened runtime is required for Developer ID notarization (the
        # GitHub-download path) and harmless for the App Store build.
        ENABLE_HARDENED_RUNTIME: YES
        # Committed default: ad-hoc signing so the project builds in CI and on
        # any machine with no Apple team. To produce a distributable build,
        # override these in Xcode (Signing & Capabilities) or via xcodebuild:
        #
        #   App Store:    set CODE_SIGN_STYLE=Automatic, DEVELOPMENT_TEAM=<TEAMID>,
        #                 "Apple Distribution" identity + an App Store provisioning profile.
        #   Developer ID: CODE_SIGN_IDENTITY="Developer ID Application: <Name> (TEAMID)",
        #                 then notarize the export (see DISTRIBUTION.md).
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""

  # iOS app (iPhone-first; personal install via Xcode — see DISTRIBUTION.md).
  # Shares all sources except AppleNugs/macOS. No Sparkle (macOS-only); no
  # entitlements (plain Keychain needs none, and there is no iOS sandbox opt-in).
  # No app icon build setting until iOS icon idioms are added in Phase F.
  AppleNugs-iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AppleNugs
        excludes:
          - "macOS/**"
          # The Mac target's Info.plist and sandbox entitlements are not iOS
          # resources; without these excludes the plist collides with the
          # processed Info-iOS.plist in the bundle.
          - "Info.plist"
          - "AppleNugs.entitlements"
    info:
      path: AppleNugs/Info-iOS.plist
      properties:
        CFBundleDisplayName: AppleNugs
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        # Keeps audio alive when the app is backgrounded/locked; pairs with the
        # AVAudioSession(.playback) category set at launch.
        UIBackgroundModes: [audio]
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSHumanReadableCopyright: "Personal use against your own nugs.net subscription only. Not affiliated with nugs.net."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.timvbs.applenugs.ios
        # Single-size 1024 universal icon (reuses the Mac 512@2x master).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # iPhone only for v1; iPad runs the iPhone layout in compatibility mode.
        TARGETED_DEVICE_FAMILY: "1"
        # Personal install: select your team in Xcode (or pass DEVELOPMENT_TEAM)
        # and let Xcode manage the profile. CI builds with CODE_SIGNING_ALLOWED=NO.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""

  # UI tests. `bundle.ui-testing` + a dependency on AppleNugs makes XcodeGen set
  # TEST_TARGET_NAME=AppleNugs (the app is the test host). The app is driven into
  # a logged-in stub state via the `-UITEST` launch argument (see AppModel).
  AppleNugsUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - AppleNugsUITests
    dependencies:
      - target: AppleNugs
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.timvbs.applenugs.uitests
        GENERATE_INFOPLIST_FILE: YES
        # UI-test bundles don't run under the app sandbox; no entitlements.
        # Match the app's ad-hoc signing so XCTest can launch the signed host app.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: NO
        # XcodeGen auto-injects BUNDLE_LOADER/TEST_HOST for any test bundle with
        # a target dependency. For UI tests that setting is wrong — it causes the
        # test runner to inject into the app process rather than launching it as a
        # separate window-bearing app, which is why the window never appears.
        # Explicitly clear both so the generated xcodeproj is clean.
        BUNDLE_LOADER: ""
        TEST_HOST: ""
