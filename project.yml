name: AppleNugs

options:
  bundleIdPrefix: com.timvbs
  deploymentTarget:
    macOS: "14.0"
    # iOS floor is set by pervasive @Observable/Observation usage — the same
    # constraint that sets the macOS 14 floor.
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    # Full data-race checking under the Swift 5 language mode: the codebase is
    # clean against it, and keeping it on surfaces any new concurrency issue as
    # a warning now (an error once we move to the Swift 6 language mode).
    SWIFT_STRICT_CONCURRENCY: "complete"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    # Marketing + build numbers live here; Info.plist references them so a
    # release is a one-line bump. Increment CURRENT_PROJECT_VERSION for every
    # build uploaded to App Store Connect.
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "2"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  AppleNugs:
    type: application
    platform: macOS
    sources:
      # AppleNugs/iOS is the iOS target's platform-specific code (entry point,
      # navigation shell, UIKit shims); everything else is shared.
      - path: AppleNugs
        excludes:
          - "iOS/**"
          # The iOS target's generated Info.plist materializes next to the Mac
          # one; keep it out of the Mac target's resource glob.
          - "Info-iOS.plist"
    scheme:
      testTargets:
        - AppleNugsTests
        - AppleNugsUITests
      gatherCoverageData: false
    dependencies:
      - package: Sparkle
    entitlements:
      path: AppleNugs/AppleNugs.entitlements
      properties:
        # Minimal sandbox: outbound network only. No file/mic/camera access —
        # all persistence stays inside the app's own container.
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        # Sparkle's installer launcher XPC service communicates via mach lookup.
        # The -spks (spawner) and -spki (installer) suffixes are Sparkle's convention.
        # $(PRODUCT_BUNDLE_IDENTIFIER) is expanded by Xcode at signing time.
        com.apple.security.temporary-exception.mach-lookup.global-name:
          - "$(PRODUCT_BUNDLE_IDENTIFIER)-spks"
          - "$(PRODUCT_BUNDLE_IDENTIFIER)-spki"
    info:
      path: AppleNugs/Info.plist
      properties:
        CFBundleDisplayName: AppleNugs
        # Deep-link scheme. `applenugs://` only — the OAuth `nugsnet` scheme is
        # deliberately left unregistered (see NugsConstants) to avoid clashing
        # with the official nugs.net app. Handles
        # applenugs://show/<date>?artist=…&song=…&venue=…&media=audio|video
        CFBundleURLTypes:
          - CFBundleURLName: com.timvbs.applenugs.deeplink
            CFBundleURLSchemes:
              - applenugs
        # One process per bundle id. LaunchServices otherwise keys "is this the
        # running handler?" on the registered on-disk PATH, so with several
        # AppleNugs.app copies around (an export, a DMG staging dir, /Applications)
        # a link can launch a fresh instance from a different path instead of
        # reaching the live one. This does NOT stop the duplicate-window bug —
        # that is a scene decision, handled by handlesExternalEvents in
        # AppleNugsApp — the two guard different layers.
        LSMultipleInstancesProhibited: true
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.music
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: "Personal use against your own nugs.net subscription only. Not affiliated with nugs.net."
        # Standard HTTPS/TLS only — exempt encryption. Declaring this skips the
        # export-compliance prompt on every App Store Connect upload.
        ITSAppUsesNonExemptEncryption: false
        # Sparkle runtime configuration.
        # SUEnableDownloaderService is omitted: network.client entitlement covers
        # outbound HTTPS and the downloader XPC is not needed in the sandbox.
        # SUEnableAutomaticChecks is omitted intentionally: leaving it unset
        # causes Sparkle to ask the user on first launch ("Check automatically?").
        SUFeedURL: https://raw.githubusercontent.com/tsvb/applenugs/main/appcast.xml
        SUPublicEDKey: WKOnGAu8QlsO9cDxBQ8peCSLDuVRTmx+p5MsruHqUFE=
        SUEnableInstallerLauncherService: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.timvbs.applenugs
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Hardened runtime is required for Developer ID notarization (the
        # GitHub-download path) and harmless for the App Store build.
        ENABLE_HARDENED_RUNTIME: YES
        # Committed default: ad-hoc signing so the project builds in CI and on
        # any machine with no Apple team. To produce a distributable build,
        # override these in Xcode (Signing & Capabilities) or via xcodebuild:
        #
        #   App Store:    set CODE_SIGN_STYLE=Automatic, DEVELOPMENT_TEAM=<TEAMID>,
        #                 "Apple Distribution" identity + an App Store provisioning profile.
        #   Developer ID: CODE_SIGN_IDENTITY="Developer ID Application: <Name> (TEAMID)",
        #                 then notarize the export (see DISTRIBUTION.md).
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""

  # iOS app (iPhone-first; personal install via Xcode — see DISTRIBUTION.md).
  # Shares all sources except AppleNugs/macOS. No Sparkle (macOS-only); no
  # entitlements (plain Keychain needs none, and there is no iOS sandbox opt-in).
  # App icon: a dedicated full-bleed 1024 universal entry (icon_ios_1024.png),
  # generated by scripts/generate-ios-icon.swift — the same waveform mark as
  # the Mac icon, redrawn opaque and edge-to-edge for the iOS mask.
  AppleNugs-iOS:
    type: application
    platform: iOS
    sources:
      - path: AppleNugs
        excludes:
          - "macOS/**"
          # The Mac target's Info.plist and sandbox entitlements are not iOS
          # resources; without these excludes the plist collides with the
          # processed Info-iOS.plist in the bundle.
          - "Info.plist"
          - "AppleNugs.entitlements"
    info:
      path: AppleNugs/Info-iOS.plist
      properties:
        CFBundleDisplayName: AppleNugs
        # Deep-link scheme, mirroring the Mac target. `applenugs://` only — the
        # OAuth `nugsnet` scheme stays unregistered (see NugsConstants) so we
        # never clash with the official nugs.net app. No LaunchServices keys
        # here: iOS has no path-keyed handler model, so nothing to disambiguate.
        CFBundleURLTypes:
          - CFBundleURLName: com.timvbs.applenugs.deeplink
            CFBundleURLSchemes:
              - applenugs
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        # Keeps audio alive when the app is backgrounded/locked; pairs with the
        # AVAudioSession(.playback) category set at launch.
        UIBackgroundModes: [audio]
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSHumanReadableCopyright: "Personal use against your own nugs.net subscription only. Not affiliated with nugs.net."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.timvbs.applenugs.ios
        # Single-size 1024 full-bleed universal iOS icon (see AppIcon set).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # iPhone only for v1; iPad runs the iPhone layout in compatibility mode.
        TARGETED_DEVICE_FAMILY: "1"
        # Personal install: set APPLENUGS_TEAM_ID in your shell before running
        # xcodegen (persists across regenerations), or select the team in Xcode
        # each time. Expands to empty when unset — CI/simulator unaffected.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ${APPLENUGS_TEAM_ID}

  # Pure-logic unit tests: host-free (no app dependency, no @testable, no
  # TEST_HOST) — the files under test compile directly into the bundle, so
  # tests run without launching (and code-signing) the host app, which would
  # otherwise trigger AppModel.bootstrap()/Keychain access on every test run.
  # Keep only Foundation-clean files in this list.
  AppleNugsTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - AppleNugsTests
      - AppleNugs/Core/Models.swift
      - AppleNugs/Downloads/DownloadManifest.swift
      - AppleNugs/Downloads/StreamPickDownload.swift
      - AppleNugs/Core/WebcastPartition.swift
      - AppleNugs/Core/WebcastRouting.swift
      - AppleNugs/Core/JSON.swift
      - AppleNugs/Core/NugsConstants.swift
      - path: AppleNugs/Core/Catalog.swift
        # Foundation-only parsing; compiled in (not @testable) to keep tests host-free.
      - path: AppleNugs/Core/DeepLink.swift
        # Compiled into the test bundle too (not @testable-imported) so the
        # logic tests stay host-free. DeepLink.swift is pure Foundation.
      - path: AppleNugs/Views/ArtistLibrary/CrateSection.swift
        # Same deal: pure Foundation (no SwiftUI, no Route/NugsConstants), so
        # the crate's month-sectioning and filter logic tests stay host-free.
    scheme:
      testTargets:
        - AppleNugsTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.timvbs.applenugs.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: NO

  # UI tests. `bundle.ui-testing` + a dependency on AppleNugs makes XcodeGen set
  # TEST_TARGET_NAME=AppleNugs (the app is the test host). The app is driven into
  # a logged-in stub state via the `-UITEST` launch argument (see AppModel).
  AppleNugsUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - AppleNugsUITests
    dependencies:
      - target: AppleNugs
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.timvbs.applenugs.uitests
        GENERATE_INFOPLIST_FILE: YES
        # UI-test bundles don't run under the app sandbox; no entitlements.
        # Match the app's ad-hoc signing so XCTest can launch the signed host app.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: NO
        # XcodeGen auto-injects BUNDLE_LOADER/TEST_HOST for any test bundle with
        # a target dependency. For UI tests that setting is wrong — it causes the
        # test runner to inject into the app process rather than launching it as a
        # separate window-bearing app, which is why the window never appears.
        # Explicitly clear both so the generated xcodeproj is clean.
        BUNDLE_LOADER: ""
        TEST_HOST: ""
